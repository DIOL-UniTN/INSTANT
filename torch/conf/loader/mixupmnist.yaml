_target_: loaders.MNISTLoader

batch_size: 512
debug_level: ${debug_level}

aug_prob: 1.0

transform:
  - _target_: torchvision.transforms.ToTensor

  - _target_: torchvision.transforms.Normalize
    mean: [0.1307, ]
    std: [0.3801, ]

aug:
  - _target_: torchvision.transforms.RandomApply
    transforms:
      - _target_: torchvision.transforms.MixUp
        num_classes: 10
    p: ${loader.aug_prob}
